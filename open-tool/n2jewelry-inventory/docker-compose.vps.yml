services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n2inventory-app
    env_file:
      - .env.vps
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3020:3020"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3020/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: n2inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - n2inventory-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  n2inventory-postgres-data:
