name: Update Daily Metal Prices

on:
  schedule:
    # 12:00 Asia/Bangkok = 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update price snapshot
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
        run: node scripts/update-daily-metal-prices.mjs

      - name: Validate price snapshot
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const snapshot = JSON.parse(fs.readFileSync('opentools/jeweler-invoice-2.0/daily-metal-prices.json', 'utf8'));
          const metals = ['XAU', 'XAG', 'XPT', 'XPD'];
          const invalid = metals.filter((symbol) => {
            const value = Number(snapshot?.prices?.[symbol]?.price_per_gram_usd);
            return !Number.isFinite(value) || value <= 0;
          });
          if (!snapshot.updated_at || invalid.length) {
            throw new Error(`Invalid daily metal snapshot. Missing timestamp or invalid prices: ${invalid.join(', ') || 'none'}`);
          }
          console.log(`Daily metal snapshot status: ${snapshot.status || 'unknown'}`);
          console.log(`Daily metal snapshot timestamp: ${snapshot.updated_at}`);
          NODE

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add opentools/jeweler-invoice-2.0/daily-metal-prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update daily metal prices"
          git push
