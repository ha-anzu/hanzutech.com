name: Update Daily Metal Prices

on:
  schedule:
    # 12:00 Asia/Bangkok = 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update price snapshot
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
        run: node scripts/update-daily-metal-prices.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Calculator/daily-metal-prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update daily metal prices"
          git push
